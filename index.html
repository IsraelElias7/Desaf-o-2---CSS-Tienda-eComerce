<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi tienda eComerce</title>
    <link rel="stylesheet" href="./assets/style/style.css">
</head>
<body>
    <div class="container">
      <header class="head">
        <h1>Tienda Israel Elías</h1>
      </header>
      <menu class="side-menu">
        <div class="menu">
          <h3>Categorías</h3>
          <ul class="menu-items">
            <li>Micrófonos <span>(13)</span></li>
            <li>Parlantes <span>(21)</span></li>
            <li>interfaces de audio <span>(41)</span></li>
            <li>Accesorios <span>(10)</span></li>
          </ul>
        </div>
      </menu>
      <main class="contain">
        <div class="card">
          <img class="img" src="./assets/images/C1000.webp" alt="C1000" />
          <h2>Micrófono Akg C1000</h2>
          <p>$199.990</p>
          <button class="bg-red">Comprar</button>
        </div>
        <div class="card">
          <img class="img" src="./assets/images/c414.webp" alt="C414" />
          <h2>Micrófono Akg C414</h2>
          <p>$1.200.000</p>
          <button class="bg-red">Comprar</button>
        </div>
        <div class="card">
          <img class="img" src="./assets/images/c800.webp" alt="C800" />
          <h2>Micrófono Sony C800</h2>
          <p>$9.569.990</p>
          <button class="bg-red">Comprar</button>
        </div>
        <div class="card">
          <img class="img" src="./assets/images/Neumann-U-87-Ai-Shockmount-Set-Z-Microphone-With-Box.jpeg" alt="U87" />
          <h2>Micrófono Neumann U 87</h2>
          <p>$4.599.990</p>
          <button class="bg-red">Comprar</button>
        </div>
      </main>
      <footer class="foot">
        <p>@Tienda Israel Elías</p>
      </footer>
    </div>
    
</body>
</html>
